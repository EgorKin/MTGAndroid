name: Build

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '*.md'
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          submodules: 'recursive'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@main

      - name: Install JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Accept Licenses
        uses: android-actions/setup-android@main

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download prebuild mtg binaries
        run:  chmod +x ./download_binaries.sh && ./download_binaries.sh

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon

      - name: Set up Keystore
        run: |
             sudo apt update -y || true
             sudo apt install -y --no-install-recommends coreutils
             mkdir -p $RUNNER_TEMP/keystores
             echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > $RUNNER_TEMP/keystores/keystore.jks

      - name: Sign app APK
        uses: ilharp/sign-android-release@v2 # Or use @nightly
        id: sign_app
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 36.0.0

      - name: Upload
        uses: actions/upload-artifact@main
        with:
          name: MTGAndroid
          path: $ANDROID_SIGNED_FILES
